<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Trailroam for Strava</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      color: #14211b;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-width: 260px;
      padding: 16px;
    }

    h1 {
      font-size: 1rem;
      margin: 0 0 8px;
    }

    p {
      color: #53645b;
      font-size: 0.875rem;
      line-height: 1.4;
      margin: 0 0 16px;
    }

    button {
      align-items: center;
      background: #276749;
      border: 0;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font: inherit;
      font-weight: 700;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      width: 100%;
    }

    button:focus-visible {
      outline: 3px solid #9ae6b4;
      outline-offset: 2px;
    }

    .status {
      color: #53645b;
      font-size: 0.75rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Trailroam for Strava</h1>
  <p>Status: Ready</p>
  <button id="open-trailroam" type="button">Open Trailroam</button>
  <div id="popup-status" class="status" role="status" aria-live="polite"></div>
  <script src="popup.js"></script>
</body>
</html>
