<main class="app-shell">
  <header class="app-header">
    <div class="brand-group">
      <a class="brand" routerLink="/map">Trailroam for Strava</a>
      <span class="app-context">Chrome extension</span>
    </div>

    <nav class="app-nav" aria-label="Primary navigation">
      <a routerLink="/activities" routerLinkActive="active">Activities</a>
      <a routerLink="/map" routerLinkActive="active">Map</a>
      <a routerLink="/settings" routerLinkActive="active">Settings</a>
    </nav>

    <div class="header-actions" aria-label="Sync controls">
      <span class="sync-status">{{ isLoginRequiredVisible() ? 'Login required' : 'Ready' }}</span>
      <button
        class="sync-menu-trigger"
        type="button"
        aria-haspopup="menu"
        aria-expanded="false"
        (click)="showLoginRequired()"
      >
        Sync new activities
        <span aria-hidden="true">v</span>
      </button>
    </div>
  </header>

  @if (isLoginRequiredVisible()) {
    <section class="session-alert" aria-labelledby="session-alert-title" role="alert">
      <div>
        <p class="alert-kicker">Strava login required</p>
        <h2 id="session-alert-title">Please log in to Strava first.</h2>
        <p>Open strava.com, sign in, then return to Trailroam for Strava.</p>
      </div>
      <div class="alert-actions">
        <a class="secondary-action" href="https://www.strava.com/login" target="_blank" rel="noreferrer">
          Open Strava
        </a>
        <button class="secondary-action" type="button" (click)="retrySessionCheck()">Retry</button>
      </div>
    </section>
  }

  <section class="app-content" aria-label="Trailroam workspace">
    <router-outlet />
  </section>
</main>
